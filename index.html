<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS PRO SUPABASE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:15px;
backdrop-filter:blur(15px);
width:350px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

input,button{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:15px;
}

input{
background:rgba(255,255,255,0.15);
color:white;
}

button{
background:#2196f3;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1976d2;
}

.sidebar{
width:220px;
background:rgba(0,0,0,0.4);
height:100vh;
position:fixed;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.sidebar button{
background:transparent;
border:1px solid rgba(255,255,255,0.2);
}

.sidebar button:hover{
background:rgba(255,255,255,0.1);
}

.content{
margin-left:240px;
padding:30px;
}

.hidden{display:none;}

.box{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
<div class="card">
<h2>Login POS PRO</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="alert('tombol hidup'); login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="sidebar">
<h2>POS PRO</h2>
<p id="info"></p>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('products')">Produk</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">

<div id="dashboard">
<div class="box">
<h2>Dashboard</h2>
<p>Saldo: Rp <span id="saldo">0</span></p>
</div>
</div>

<div id="products" class="hidden">
<div class="box">
<h2>Daftar Produk</h2>
<div id="listProduk"></div>
</div>

<div class="box">
<h3>Tambah Produk</h3>
<input id="pname" placeholder="Nama Produk">
<input id="pprice" type="number" placeholder="Harga">
<button onclick="addProduk()">Tambah Produk</button>
</div>
</div>

</div>
</div>

<script>
const supabase = window.supabase.createClient(
"https://jigcdhjjrvbzibyxsraz.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppZ2NkaGpqcnZiemlieXhzcmF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NDYxNjEsImV4cCI6MjA4NzQyMjE2MX0.KhohNnjt0V2rXhbD-rGQTXUMDC3P8Z9Qj84ZTPjXGpE"
);

let currentUser=null;

async function login(){
try{

let usernameInput=document.getElementById("username").value;
let passwordInput=document.getElementById("password").value;

let {data,error}=await supabase
.from("users")
.select("*")
.eq("username",usernameInput)
.eq("password",passwordInput)
.single();

if(error){
alert("Error: "+error.message);
return;
}

if(!data){
alert("User tidak ditemukan");
return;
}

currentUser=data;

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

document.getElementById("info").innerText=data.username+" ("+data.role+")";
document.getElementById("saldo").innerText=data.saldo;

loadProduk();

}catch(err){
alert("JS Error: "+err.message);
}
}

async function loadProduk(){
let {data,error}=await supabase.from("products").select("*");

if(error){
alert(error.message);
return;
}

document.getElementById("listProduk").innerHTML="";

data.forEach(p=>{
document.getElementById("listProduk").innerHTML+=
"<p>"+p.name+" - Rp "+p.price+"</p>";
});
}

async function addProduk(){

if(currentUser.role==="user"){
alert("User tidak bisa tambah produk");
return;
}

let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;

let {error}=await supabase.from("products").insert({
name:name,
price:price
});

if(error){
alert(error.message);
return;
}

loadProduk();
}

function show(id){
document.querySelectorAll(".content > div")
.forEach(d=>d.classList.add("hidden"));

document.getElementById(id)
.classList.remove("hidden");
}

function logout(){
location.reload();
}
</script>

</body>
</html>
