<!DOCTYPE html>
<html>
<head>
  <title>City Empire</title>
  <style>
    body {
      background: #1e1e1e;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 14px;
    }
    .box {
      background: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      width: 300px;
    }
  </style>
</head>
<body>

<h1>City Empire Online</h1>

<div class="box">
  <p>Nama: <span id="nama"></span></p>
  <p>Level: <span id="level"></span></p>
  <p>Uang Cash: Rp <span id="uang"></span></p>
  <p>Bank: Rp <span id="bank"></span></p>
  <p>Energi: <span id="energi"></span>/100</p>

  <hr>

  <button onclick="kerja()">Kerja</button>
  <button onclick="istirahat()">Istirahat</button>
  <button onclick="simpanBank()">Simpan ke Bank</button>
  <button onclick="ambilBank()">Ambil dari Bank</button>
  <button onclick="resetGame()">Reset</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("playerData"));

if (!data) {
  let nama = prompt("Masukkan nama kamu:");
  data = {
    nama: nama,
    uang: 0,
    bank: 0,
    level: 1,
    energi: 100,
    exp: 0
  };
}

function saveData() {
  localStorage.setItem("playerData", JSON.stringify(data));
}

function updateUI() {
  document.getElementById("nama").innerText = data.nama;
  document.getElementById("uang").innerText = data.uang;
  document.getElementById("bank").innerText = data.bank;
  document.getElementById("level").innerText = data.level;
  document.getElementById("energi").innerText = data.energi;
}

function kerja() {
  if (data.energi <= 0) {
    alert("Energi habis!");
    return;
  }

  data.uang += 1000;
  data.energi -= 10;
  data.exp += 10;

  if (data.exp >= 100) {
    data.level++;
    data.exp = 0;
    alert("Level Naik!");
  }

  saveData();
  updateUI();
}

function istirahat() {
  data.energi = 100;
  saveData();
  updateUI();
}

function simpanBank() {
  let jumlah = prompt("Masukkan jumlah yang ingin disimpan:");
  jumlah = parseInt(jumlah);

  if (jumlah > data.uang) {
    alert("Uang tidak cukup!");
    return;
  }

  data.uang -= jumlah;
  data.bank += jumlah;

  saveData();
  updateUI();
}

function ambilBank() {
  let jumlah = prompt("Masukkan jumlah yang ingin diambil:");
  jumlah = parseInt(jumlah);

  if (jumlah > data.bank) {
    alert("Saldo bank tidak cukup!");
    return;
  }

  data.bank -= jumlah;
  data.uang += jumlah;

  saveData();
  updateUI();
}

function resetGame() {
  localStorage.removeItem("playerData");
  location.reload();
}

updateUI();
</script>

</body>
</html>
