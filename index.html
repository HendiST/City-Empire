<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS PRO</title>
<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}
.login-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.card{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:15px;
backdrop-filter:blur(12px);
width:350px;
}
input,button{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}
button{
background:#2196f3;
color:white;
cursor:pointer;
}
.sidebar{
width:200px;
background:rgba(0,0,0,0.4);
height:100vh;
position:fixed;
padding:20px;
}
.content{
margin-left:220px;
padding:20px;
}
.hidden{display:none;}
</style>
</head>

<body>

<div class="login-container" id="loginPage">
<div class="card">
<h2>Login POS</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="app" class="hidden">
<div class="sidebar">
<h3>POS PRO</h3>
<p id="userInfo"></p>
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('products')">Produk</button>
<button onclick="showSection('users')">Users</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">
<div id="dashboard">
<h2>Dashboard</h2>
<p>Saldo: Rp <span id="saldo"></span></p>
</div>

<div id="products" class="hidden">
<h2>Produk</h2>
<div id="productList"></div>
<input id="pname" placeholder="Nama Produk">
<input id="pprice" type="number" placeholder="Harga">
<button onclick="addProduct()">Tambah Produk</button>
</div>

<div id="users" class="hidden">
<h2>Daftar User (Owner Only)</h2>
<div id="userList"></div>
</div>

</div>
</div>

<script>
const API="ISI_URL_RAILWAY_KAMU";

let token="";
let role="";

function login(){
fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:username.value,
password:password.value
})
})
.then(res=>res.json())
.then(data=>{
if(data.token){
token=data.token;
loginPage.classList.add("hidden");
app.classList.remove("hidden");
loadUser();
}else alert(data);
});
}

function loadUser(){
const payload=JSON.parse(atob(token.split(".")[1]));
role=payload.role;
userInfo.innerText="User: "+payload.username+" ("+role+")";
loadProducts();
if(role==="owner") loadUsers();
}

function loadProducts(){
fetch(API+"/products",{headers:{Authorization:token}})
.then(res=>res.json())
.then(data=>{
productList.innerHTML="";
data.forEach(p=>{
productList.innerHTML+=p.name+" - Rp "+p.price+"<br>";
});
});
}

function addProduct(){
fetch(API+"/products",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({
name:pname.value,
price:pprice.value
})
})
.then(()=>loadProducts());
}

function loadUsers(){
fetch(API+"/users",{headers:{Authorization:token}})
.then(res=>res.json())
.then(data=>{
userList.innerHTML="";
data.forEach(u=>{
userList.innerHTML+=u.username+" - "+u.role+" - Saldo: "+u.saldo+"<br>";
});
});
}

function showSection(sec){
document.querySelectorAll(".content > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(sec).classList.remove("hidden");
}

function logout(){location.reload();}
</script>

</body>
</html>
