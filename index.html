<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS PRO SUPABASE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}
.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.card{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:15px;
backdrop-filter:blur(12px);
width:350px;
}
input,button{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}
button{
background:#2196f3;
color:white;
cursor:pointer;
}
.sidebar{
width:200px;
background:rgba(0,0,0,0.4);
height:100vh;
position:fixed;
padding:20px;
}
.content{
margin-left:220px;
padding:20px;
}
.hidden{display:none;}
</style>
</head>

<body>

<div class="login" id="loginPage">
<div class="card">
<h2>Login POS</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="app" class="hidden">
<div class="sidebar">
<h3>POS PRO</h3>
<p id="info"></p>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('products')">Produk</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">
<div id="dashboard">
<h2>Dashboard</h2>
Saldo: Rp <span id="saldo"></span>
</div>

<div id="products" class="hidden">
<h2>Produk</h2>
<div id="listProduk"></div>
<input id="pname" placeholder="Nama Produk">
<input id="pprice" type="number" placeholder="Harga">
<button onclick="addProduk()">Tambah Produk</button>
</div>
</div>
</div>

<script>
const supabase = window.supabase.createClient(
"https://jigcdhjjrvbzibyxsraz.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppZ2NkaGpqcnZiemlieXhzcmF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NDYxNjEsImV4cCI6MjA4NzQyMjE2MX0.KhohNnjt0V2rXhbD-rGQTXUMDC3P8Z9Qj84ZTPjXGpE"
);

let currentUser=null;

async function login(){
let {data,error}=await supabase
.from("users")
.select("*")
.eq("username",username.value)
.eq("password",password.value)
.single();

if(error || !data){
alert("Login gagal");
return;
}

currentUser=data;
loginPage.classList.add("hidden");
app.classList.remove("hidden");

info.innerText=data.username+" ("+data.role+")";
saldo.innerText=data.saldo;

loadProduk();
}

async function loadProduk(){
let {data}=await supabase.from("products").select("*");
listProduk.innerHTML="";
data.forEach(p=>{
listProduk.innerHTML+=p.name+" - Rp "+p.price+"<br>";
});
}

async function addProduk(){
if(currentUser.role==="user"){
alert("User tidak bisa tambah produk");
return;
}

await supabase.from("products").insert({
name:pname.value,
price:pprice.value
});

loadProduk();
}

function show(id){
document.querySelectorAll(".content > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function logout(){
location.reload();
}
</script>

</body>
</html>
