<!DOCTYPE html>
<html>
<head>
  <title>City Empire</title>
  <style>
    body {
      background: #1e1e1e;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
    }
    .box {
      background: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>

<h1>City Empire Online</h1>

<div class="box">
  <p>Nama: <span id="nama">-</span></p>
  <p>Level: <span id="level">1</span></p>
  <p>Uang: Rp <span id="uang">0</span></p>
  <p>Energi: <span id="energi">100</span>/100</p>

  <button onclick="kerja()">Kerja</button>
  <button onclick="resetGame()">Reset</button>
</div>

<script>
let nama = prompt("Masukkan nama kamu:");
document.getElementById("nama").innerText = nama;

let uang = 0;
let level = 1;
let energi = 100;
let exp = 0;

function updateUI() {
  document.getElementById("uang").innerText = uang;
  document.getElementById("level").innerText = level;
  document.getElementById("energi").innerText = energi;
}

function kerja() {
  if (energi <= 0) {
    alert("Energi habis! Istirahat dulu.");
    return;
  }

  uang += 1000;
  energi -= 10;
  exp += 10;

  if (exp >= 100) {
    level++;
    exp = 0;
    alert("Level Naik!");
  }

  updateUI();
}

function resetGame() {
  uang = 0;
  level = 1;
  energi = 100;
  exp = 0;
  updateUI();
}
</script>

</body>
</html>
