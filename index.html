<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS Pro Blue</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}
.box{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  padding:20px;
  margin:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}
input,button{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
}
button{
  background:#2196f3;
  color:white;
  cursor:pointer;
}
button:hover{
  background:#0d8bf2;
}
.flex{display:flex;gap:20px;flex-wrap:wrap;}
</style>
</head>

<body>

<div id="loginBox" class="box">
<h2>🔐 Login Kasir</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<div class="box">
<h2>💳 POS Modern</h2>
Kasir: <span id="kasir"></span> |
Saldo: Rp <span id="saldo"></span>
<button onclick="logout()">Logout</button>
</div>

<div class="flex">

<div class="box" style="flex:1">
<h3>📦 Produk</h3>
<input id="namaP" placeholder="Nama">
<input id="hargaP" type="number" placeholder="Harga">
<button onclick="addProduct()">Tambah</button>
<div id="produkList"></div>
</div>

<div class="box" style="flex:1">
<h3>🛒 Keranjang</h3>
<div id="cart"></div>
<h3>Total: Rp <span id="total">0</span></h3>
<input id="bayar" type="number" placeholder="Bayar">
<button onclick="bayarTransaksi()">Bayar</button>
<h3>Kembalian: Rp <span id="kembali">0</span></h3>
<button onclick="resetCart()">Reset</button>
</div>

<div class="box" style="flex:1">
<h3>📊 Laporan</h3>
<h2>Rp <span id="laporan"></span></h2>
<button onclick="exportExcel()">Export Excel</button>

<h3>💳 Transfer Saldo</h3>
<input id="tujuan" placeholder="Username Tujuan">
<input id="jumlahTf" type="number" placeholder="Jumlah">
<button onclick="transfer()">Transfer</button>
</div>

</div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [
  {username:"admin",password:"1234",saldo:100000}
];
let produk = JSON.parse(localStorage.getItem("produk")) || [];
let transaksi = JSON.parse(localStorage.getItem("transaksi")) || [];
let cart=[];
let total=0;
let currentUser=null;

function saveAll(){
  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("produk",JSON.stringify(produk));
  localStorage.setItem("transaksi",JSON.stringify(transaksi));
}

function login(){
  let u=username.value;
  let p=password.value;
  let user=users.find(x=>x.username===u && x.password===p);
  if(!user) return alert("Login gagal");
  currentUser=user;
  loginBox.style.display="none";
  app.style.display="block";
  kasir.innerText=user.username;
  updateUI();
}

function logout(){
  location.reload();
}

function updateUI(){
  saldo.innerText=currentUser.saldo;
  laporan.innerText=transaksi.reduce((a,b)=>a+b.total,0);
  renderProduk();
  renderCart();
}

function addProduct(){
  let nama=namaP.value;
  let harga=parseInt(hargaP.value);
  if(!nama||!harga) return;
  produk.push({nama,harga});
  saveAll();
  renderProduk();
}

function renderProduk(){
  produkList.innerHTML="";
  produk.forEach((p,i)=>{
    let btn=document.createElement("button");
    btn.innerText=p.nama+" - "+p.harga;
    btn.onclick=()=>addToCart(i);
    produkList.appendChild(btn);
  });
}

function addToCart(i){
  cart.push(produk[i]);
  total+=produk[i].harga;
  renderCart();
}

function renderCart(){
  cart.innerHTML="";
  cartDiv=document.getElementById("cart");
  cartDiv.innerHTML="";
  cart.forEach(p=>{
    cartDiv.innerHTML+=p.nama+" - "+p.harga+"<br>";
  });
  totalEl=document.getElementById("total");
  totalEl.innerText=total;
}

function bayarTransaksi(){
  let uang=parseInt(bayar.value);
  if(uang<total) return alert("Uang kurang");
  let kembali=uang-total;
  kembaliEl=document.getElementById("kembali");
  kembaliEl.innerText=kembali;

  currentUser.saldo+=total;
  transaksi.push({user:currentUser.username,total});
  total=0;
  cart=[];
  saveAll();
  updateUI();
}

function resetCart(){
  cart=[];
  total=0;
  renderCart();
}

function transfer(){
  let tujuanUser=users.find(x=>x.username===tujuan.value);
  let jumlah=parseInt(jumlahTf.value);
  if(!tujuanUser) return alert("User tidak ada");
  if(currentUser.saldo<jumlah) return alert("Saldo kurang");
  currentUser.saldo-=jumlah;
  tujuanUser.saldo+=jumlah;
  saveAll();
  updateUI();
  alert("Transfer berhasil");
}

function exportExcel(){
  let ws=XLSX.utils.json_to_sheet(transaksi);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Laporan");
  XLSX.writeFile(wb,"laporan.xlsx");
}
</script>

</body>
</html>
